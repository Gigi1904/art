<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahuva Gigi — Artwork</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Ahuva Gigi</a>

    <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span>
    </button>

    <nav class="top-nav" aria-label="Main navigation">
      <a class="active" href="index.html">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="layout">
    <aside class="side-menu" aria-label="Artwork filters">
      <p class="side-title">Work</p>

      <button class="filter active" data-filter="all">All</button>

      <div class="filter-group">
        <p>Year</p>
        <button class="filter" data-filter="2026">2026</button>
        <button class="filter" data-filter="2025">2025</button>
        <button class="filter" data-filter="2024">2024</button>
      </div>

      <div class="filter-group">
        <p>Type</p>
        <button class="filter" data-filter="painting">Painting</button>
        <button class="filter" data-filter="print">Print</button>
        <button class="filter" data-filter="drawing">Drawing</button>
        <button class="filter" data-filter="mixed-media">Mixed Media</button>
      </div>
    </aside>

    <section class="work-grid" id="workGrid" aria-live="polite"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close-lightbox" aria-label="Close image">&times;</button>
    <button class="lightbox-arrow prev" aria-label="Previous image">&#8249;</button>
    <img id="lightboxImage" src="" alt="" />
    <button class="lightbox-arrow next" aria-label="Next image">&#8250;</button>
    <p id="lightboxCaption"></p>
  </div>

  <script src="js/images.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
