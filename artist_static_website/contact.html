<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Ahuva Gigi</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">Ahuva Gigi</a>
    <button class="menu-toggle" aria-label="Open menu" aria-expanded="false"><span></span><span></span></button>
    <nav class="top-nav" aria-label="Main navigation">
      <a href="index.html">Work</a>
      <a href="about.html">About</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="contact-page">
    <h1>Contact</h1>
    <p class="contact-note">For enquiries, commissions, or artwork information:</p>
    <a href="mailto:your-email@example.com">your-email@example.com</a>

    <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
      <label>
        Name
        <input type="text" name="name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" required>
      </label>
      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>
      <button type="submit">Submit</button>
    </form>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
